<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังแก้ไข — วัดป่าเขาภูหลวง</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="history.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="top-row">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>

            <div class="icon-wrap">
                <div class="icon-ring">
                    <span class="bug-emoji">🪲</span>
                </div>
            </div>

            <h1>SYSTEM DEBUG</h1>
            <p>กำลังแก้ รอแปปครับ วุ่นกับ bug มาก</p>

            <div class="log-box">
                <div class="log-line info" id="l1">&gt; scanning files...</div>
                <div class="log-line err"  id="l2">&gt; [ERR] anchor link missing</div>
                <div class="log-line ok"   id="l3">&gt; hero-fix.css → applied ✓</div>
                <div class="log-line warn" id="l4">&gt; [WARN] og:image not set</div>
            </div>

            <div class="progress-wrap">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-labels">
                <span class="dot-step on"></span>
                <span class="dot-step on"></span>
                <span class="dot-step"></span>
                <span class="dot-step"></span>
                <span class="dot-step"></span>
            </div>

            <span class="status-text">FIXING INCONSISTENCIES...</span>

            <div class="action-area">
                <a href="index.html" class="btn-back">← ย้อนกลับหน้าแรก</a>
            </div>
        </div>
    </div>
</body>
</html>
