<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support - GUS</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="donategus.css">
</head>
<body>
<div class="bg-mesh"></div>
<main class="main-container">
<div class="profile-header">
<div class="profile-img">G</div>
<h1 class="name">GUS </h1>
<p class="bio">สนับสนุนค่าเทอมผมหน่อยนนะครับ 🙏</p>
</div>
<div class="account-cards">
<div class="acc-card" onclick="copyData('1338992625', 'คัดลอกกสิกรไทยแล้ว ✓')">
<div class="acc-info">
<span class="bank-name">กสิกรไทย (K-Bank)</span>
<span class="acc-no">133-899-2625</span>
</div>
<div class="copy-btn">คัดลอก</div>
</div>
<div class="acc-card" onclick="copyData('0801138627', 'คัดลอกพร้อมเพย์แล้ว ✓')">
<div class="acc-info">
<span class="bank-name">พร้อมเพย์ (PromptPay)</span>
<span class="acc-no">080-113-8627</span>
</div>
<div class="copy-btn">คัดลอก</div>
</div>
</div>
<div class="qr-generator">
<p class="section-title">เลือกหรือพิมพ์จำนวนเงิน</p>
<div class="amount-presets">
<button class="preset-btn" onclick="setAmt(20, this)">฿20</button>
<button class="preset-btn" onclick="setAmt(50, this)">฿50</button>
<button class="preset-btn" onclick="setAmt(99, this)">฿99</button>
<button class="preset-btn" onclick="setAmt(199, this)">฿199</button>
<button class="preset-btn" onclick="setAmt(500, this)">฿500</button>
<button class="preset-btn" onclick="setAmt(1000, this)">฿1,000</button>
</div>
<div class="input-wrapper">
<span class="baht-icon">฿</span>
<input type="number" id="amount" placeholder="ระบุจำนวน..." min="1" oninput="clearActive()">
</div>
<button class="btn-generate" onclick="createQR()">สร้าง QR โอนเงิน</button>
<div class="qr-result" id="qrResult">
<img src="" id="qrImage" alt="QR Code">
<p class="qr-label" id="qrLabel"></p>
</div>
</div>
<a href="index.html" class="back-btn">← กลับหน้าหลัก</a>
</main>
<div class="toast" id="toast"></div>
<script src="donategus.js"></script>
</body>
</html>
